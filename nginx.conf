# 3D 留言板生产环境 Nginx 配置文件示例
# 建议放置在 /etc/nginx/conf.d/messageboard.conf

server {
    listen 80;
    server_name localhost; # 或者是您的域名 (例如 example.com)

    # 启用 Gzip 压缩以极大降低前端 JS/CSS 在传输中的网络消耗
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # 限制上传内容大小 (留言最长 500 字，接口包极小，限制为 1M 足够)
    client_max_body_size 1m;

    # 1. 托管前端静态页面 (Vite 编译输出在 client/dist 目录下)
    location / {
        root /var/www/messageboard/client/dist; # 替换为您的前端代码在服务器上的绝对路径
        index index.html;
        try_files $uri $uri/ /index.html; # 支持 Vue-Router 单页面应用路由防 404

        # 针对打包后的 JS/CSS 静态资源进行强缓存，提升复访速度
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 2. 反向代理后端 API 接口，解决生产跨域并隐藏 Express 服务真实端口
    location /api/ {
        proxy_pass http://127.0.0.1:4001; # 代理到本地运行的 Express 端口
        proxy_http_version 1.1;
        
        # 传递客户端真实 IP 与协议头，供后端审计
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 确保跨域头能正确配合反代（虽然 Express 也配置了 CORS，但由 Nginx 做更加安全高效）
        # add_header Access-Control-Allow-Origin *;
    }

    # 错误页面配置
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
